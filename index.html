<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep — Apr 8–29, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --surface: #0f1118;
    --card: #131620;
    --border: #1e2235;
    --border-bright: #2a3050;
    --text: #d1d5f0;
    --text-dim: #6b7399;
    --text-muted: #3d4465;

    --concept: #818cf8;
    --concept-bg: rgba(129, 140, 248, 0.08);
    --dsa: #38bdf8;
    --dsa-bg: rgba(56, 189, 248, 0.08);
    --sql: #fb923c;
    --sql-bg: rgba(251, 146, 60, 0.08);
    --python: #4ade80;
    --python-bg: rgba(74, 222, 128, 0.08);
    --reflect: #e879f9;
    --reflect-bg: rgba(232, 121, 249, 0.08);
    --off: #4b5563;

    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    padding-bottom: 80px;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7, 9, 15, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #fff;
  }

  .header-title span {
    color: var(--accent);
  }

  .progress-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .progress-label strong {
    color: var(--accent);
    font-weight: 600;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(56,189,248,0.5);
  }

  /* ─── LAYOUT ─── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  /* ─── LEGEND ─── */
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .legend-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ─── WEEK BLOCK ─── */
  .week-block {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    gap: 12px;
  }

  .week-header:hover { background: var(--card); }

  .week-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #fff;
  }

  .week-theme {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    flex: 1;
  }

  .week-stats {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .week-prog-text {
    font-size: 0.68rem;
    color: var(--text-dim);
  }

  .week-chevron {
    color: var(--text-dim);
    font-size: 0.75rem;
    transition: transform 0.3s;
  }

  .week-block.open .week-chevron { transform: rotate(180deg); }

  .week-body {
    display: none;
    padding: 0 12px 12px;
    background: var(--bg);
  }

  .week-block.open .week-body { display: block; }

  /* ─── DAY CARD ─── */
  .day-card {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.day-off {
    border-color: var(--border);
    opacity: 0.5;
  }

  .day-card.day-done { border-color: rgba(74, 222, 128, 0.3); }

  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card);
    cursor: pointer;
    user-select: none;
  }

  .day-header:hover { background: #171b28; }

  .day-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    min-width: 46px;
  }

  .day-date {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 80px;
  }

  .day-title {
    font-size: 0.75rem;
    color: var(--text);
    flex: 1;
    font-weight: 400;
  }

  .day-off-badge {
    font-size: 0.62rem;
    background: rgba(107,114,128,0.15);
    color: var(--off);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .day-progress-ring {
    position: relative;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .day-progress-ring svg {
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: var(--border); stroke-width: 2.5; }
  .ring-fill {
    fill: none;
    stroke: var(--python);
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.4s ease, stroke 0.3s;
  }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--text-dim);
  }

  .day-time-badge {
    font-size: 0.62rem;
    color: var(--text-dim);
    min-width: 50px;
    text-align: right;
  }

  .day-chevron {
    color: var(--text-muted);
    font-size: 0.6rem;
    transition: transform 0.3s;
  }

  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 8px 16px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .day-card.open .day-body { display: block; }

  /* ─── TASK ─── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .task-item:last-child { border-bottom: none; }
  .task-item:hover { opacity: 0.9; }

  .task-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border-bright);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .task-item.checked .task-check {
    background: var(--python);
    border-color: var(--python);
  }

  .task-item.checked .task-check::after {
    content: '✓';
    font-size: 10px;
    color: #000;
    font-weight: 700;
  }

  .task-item.checked .task-text {
    opacity: 0.35;
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
  }

  .task-content { flex: 1; min-width: 0; }

  .task-tag {
    display: inline-block;
    font-size: 0.57rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 7px;
    border-radius: 20px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .tag-concept { background: var(--concept-bg); color: var(--concept); }
  .tag-dsa     { background: var(--dsa-bg);     color: var(--dsa); }
  .tag-sql     { background: var(--sql-bg);     color: var(--sql); }
  .tag-python  { background: var(--python-bg);  color: var(--python); }
  .tag-reflect { background: var(--reflect-bg); color: var(--reflect); }

  .task-text {
    font-size: 0.73rem;
    color: var(--text);
    line-height: 1.5;
    transition: opacity 0.2s, text-decoration 0.2s;
  }

  .task-time {
    font-size: 0.62rem;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 3px;
  }

  /* ─── RESET BUTTON ─── */
  .reset-btn {
    display: block;
    margin: 32px auto 0;
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--text-dim); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  @media (max-width: 600px) {
    .week-theme { display: none; }
    .day-title { font-size: 0.68rem; }
    .task-text { font-size: 0.68rem; }
  }
</style>
</head>

<div class="header">

// ── State ──────────────────────────────────────────────────────
const STORE_KEY = 'interview_prep_2026';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch {}
}

let state = loadState();

function taskKey(dayNum, taskIdx) { return `d${dayNum}_t${taskIdx}`; }

function isChecked(dayNum, taskIdx) {
  return !!state[taskKey(dayNum, taskIdx)];
}

function toggleTask(dayNum, taskIdx) {
  const k = taskKey(dayNum, taskIdx);
  state[k] = !state[k];
  saveState(state);
  updateAll();
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState(state);
  updateAll();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('plan-root');
  root.innerHTML = '';

  PLAN.forEach((week, wi) => {
    const wDiv = document.createElement('div');
    wDiv.className = 'week-block open';
    wDiv.id = `week-${week.week}`;

    wDiv.innerHTML = `
      <div class="week-header" onclick="toggleWeek(${week.week})">
        <span class="week-label">${week.label} <span style="color:var(--text-dim);font-weight:400;font-size:0.7rem">${week.dates}</span></span>
        <span class="week-theme">${week.theme}</span>
        <div class="week-stats">
          <span class="week-prog-text" id="week-prog-${week.week}">0 / 0</span>
          <span class="week-chevron">▲</span>
        </div>
      </div>
      <div class="week-body" id="week-body-${week.week}">
        ${week.days.map(day => renderDay(day)).join('')}
      </div>
    `;
    root.appendChild(wDiv);
  });

  // attach task toggle listeners
  document.querySelectorAll('.task-item').forEach(el => {
    el.addEventListener('click', () => {
      const dn = +el.dataset.day;
      const ti = +el.dataset.task;
      toggleTask(dn, ti);
    });
  });

  updateAll();
}

function renderDay(day) {
  if (day.off) {
    return `
      <div class="day-card day-off">
        <div class="day-header" style="cursor:default">
          <span class="day-num">Day ${day.num}</span>
          <span class="day-date">${day.date} ${day.day}</span>
          <span class="day-title" style="color:var(--text-dim)">Rest Day</span>
          <span class="day-off-badge">OFF</span>
        </div>
      </div>`;
  }

  const tasks = day.tasks.map((t, i) => `
    <div class="task-item" data-day="${day.num}" data-task="${i}" id="task-${day.num}-${i}">
      <div class="task-check"></div>
      <div class="task-content">
        <span class="task-tag tag-${t.type}">${t.type}</span>
        <span class="task-text">${escHtml(t.text)}</span>
      </div>
      <div class="task-time">${t.min}m</div>
    </div>`).join('');

  const circumference = 2 * Math.PI * 13; // r=13

  return `
    <div class="day-card open" id="day-card-${day.num}">
      <div class="day-header" onclick="toggleDay(${day.num})">
        <span class="day-num">Day ${day.num}</span>
        <span class="day-date">${day.date} ${day.day}</span>
        <span class="day-title">${escHtml(day.title)}</span>
        <div class="day-progress-ring" id="ring-${day.num}">
          <svg width="32" height="32" viewBox="0 0 32 32">
            <circle class="ring-bg" cx="16" cy="16" r="13"/>
            <circle class="ring-fill" id="ring-fill-${day.num}" cx="16" cy="16" r="13"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"/>
          </svg>
          <div class="ring-text" id="ring-text-${day.num}">0/${day.tasks.length}</div>
        </div>
        <span class="day-time-badge">${day.total}m</span>
        <span class="day-chevron">▲</span>
      </div>
      <div class="day-body" id="day-body-${day.num}">
        ${tasks}
      </div>
    </div>`;
}

function toggleWeek(weekNum) {
  const block = document.getElementById(`week-${weekNum}`);
  block.classList.toggle('open');
}

function toggleDay(dayNum) {
  const card = document.getElementById(`day-card-${dayNum}`);
  card.classList.toggle('open');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Update ─────────────────────────────────────────────────────
function updateAll() {
  let totalTasks = 0, totalDone = 0;
  const circumference = 2 * Math.PI * 13;

  PLAN.forEach(week => {
    let weekTotal = 0, weekDone = 0;

    week.days.forEach(day => {
      if (day.off) return;
      const n = day.tasks.length;
      let done = 0;

      day.tasks.forEach((t, i) => {
        const checked = isChecked(day.num, i);
        const el = document.getElementById(`task-${day.num}-${i}`);
        if (el) el.classList.toggle('checked', checked);
        if (checked) done++;
      });

      // ring
      const fill = document.getElementById(`ring-fill-${day.num}`);
      const txt  = document.getElementById(`ring-text-${day.num}`);
      const card = document.getElementById(`day-card-${day.num}`);
      if (fill && txt) {
        const pct = n > 0 ? done / n : 0;
        fill.style.strokeDashoffset = circumference * (1 - pct);
        fill.style.stroke = done === n && n > 0 ? 'var(--python)' : 'var(--accent)';
        txt.textContent = `${done}/${n}`;
        if (card) card.classList.toggle('day-done', done === n && n > 0);
      }

      weekDone += done; weekTotal += n;
      totalDone += done; totalTasks += n;
    });

    const prog = document.getElementById(`week-prog-${week.week}`);
    if (prog) prog.textContent = `${weekDone} / ${weekTotal}`;
  });

  const pct = totalTasks > 0 ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('done-count').textContent = totalDone;
  document.getElementById('total-count').textContent = totalTasks;
  document.getElementById('done-pct').textContent = pct + '%';
  document.getElementById('global-bar').style.width = pct + '%';
}

// ── Init ──────────────────────────────────────────────────────
render();
</script>
